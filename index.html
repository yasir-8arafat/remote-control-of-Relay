<!DOCTYPE html>
<html>

<head>

    <title>ESP32 3 Relay Control</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .relay {
            border: 1px solid gray;
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        .on {
            background: green;
            color: white;
        }

        .off {
            background: red;
            color: white;
        }
    </style>

</head>

<body>

    <h1>Firebase Relay Control</h1>


    <div class="relay">

        <h2 id="state1">Relay 1 : Loading...</h2>

        <button class="on" onclick="setRelay(1,1)">ON</button>

        <button class="off" onclick="setRelay(1,0)">OFF</button>

    </div>



    <div class="relay">

        <h2 id="state2">Relay 2 : Loading...</h2>

        <button class="on" onclick="setRelay(2,1)">ON</button>

        <button class="off" onclick="setRelay(2,0)">OFF</button>

    </div>



    <div class="relay">

        <h2 id="state3">Relay 3 : Loading...</h2>

        <button class="on" onclick="setRelay(3,1)">ON</button>

        <button class="off" onclick="setRelay(3,0)">OFF</button>

    </div>



    <script>

        const databaseURL =
            "https://firstesp32project-7b0e1-default-rtdb.asia-southeast1.firebasedatabase.app";



        // Read relay state
        function getRelay(relayNo) {

            fetch(databaseURL + "/relay" + relayNo + "/state.json")

                .then(response => response.json())

                .then(data => {

                    document.getElementById("state" + relayNo).innerHTML =
                        "Relay " + relayNo + " = " + data;

                });

        }



        // Write relay state
        function setRelay(relayNo, state) {

            fetch(databaseURL + "/relay" + relayNo + "/state.json", {

                method: "PUT",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(state)

            })

                .then(() => {

                    getRelay(relayNo);

                });

        }



        // Load current state
        getRelay(1);
        getRelay(2);
        getRelay(3);

    </script>

</body>

</html>
